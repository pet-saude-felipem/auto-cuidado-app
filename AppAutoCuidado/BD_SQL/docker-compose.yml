services:
  postgres:
    image: postgres:16-alpine
    container_name: autocuidado_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       autocuidado
      POSTGRES_USER:     autocuidado_user
      POSTGRES_PASSWORD: autocuidado_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autocuidado_user -d autocuidado"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
